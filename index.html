<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos - Django + JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Gestión de Productos</h2>

        <div class="card mb-4 shadow-sm border-primary">
            <div class="card-body">
                <h5 class="card-title" id="formTitle">Añadir Nuevo Producto</h5>
                <form id="productForm" class="row g-3">
                    <input type="hidden" id="productId"> <div class="col-md-4">
                        <input type="text" id="name" class="form-control" placeholder="Nombre" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="description" class="form-control" placeholder="Descripción">
                    </div>
                    <div class="col-md-2">
                        <input type="number" id="quantity" class="form-control" placeholder="Cantidad" required>
                    </div>
                    <div class="col-md-2 d-flex gap-1">
                        <button type="submit" id="btnSubmit" class="btn btn-primary w-100">Guardar</button>
                        <button type="button" id="btnCancel" class="btn btn-secondary d-none" onclick="resetForm()">X</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Cantidad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api/1.0/products/';
        let editingId = null;

        // 1. Obtener Productos
        async function getProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                const tableBody = document.getElementById('productTableBody');
                tableBody.innerHTML = '';

                products.forEach(p => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.name}</td>
                            <td>${p.description || '-'}</td>
                            <td>${p.quantity}</td>
                            <td>
                                <button class="btn btn-warning btn-sm me-1" onclick="prepareEdit(${p.id}, '${p.name}', '${p.description}', ${p.quantity})">Editar</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Borrar</button>
                            </td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        // 2. Preparar los datos en el formulario para editar
        function prepareEdit(id, name, desc, qty) {
            editingId = id;
            document.getElementById('name').value = name;
            document.getElementById('description').value = desc === 'null' ? '' : desc;
            document.getElementById('quantity').value = qty;
            
            document.getElementById('formTitle').innerText = "Editando Producto #" + id;
            document.getElementById('btnSubmit').innerText = "Actualizar";
            document.getElementById('btnSubmit').className = "btn btn-success w-100";
            document.getElementById('btnCancel').classList.remove('d-none');
        }

        // 3. Resetear formulario
        function resetForm() {
            editingId = null;
            document.getElementById('productForm').reset();
            document.getElementById('formTitle').innerText = "Añadir Nuevo Producto";
            document.getElementById('btnSubmit').innerText = "Guardar";
            document.getElementById('btnSubmit').className = "btn btn-primary w-100";
            document.getElementById('btnCancel').classList.add('d-none');
        }

        // 4. Guardar (POST) o Actualizar (PUT)
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                quantity: parseInt(document.getElementById('quantity').value)
            };

            const url = editingId ? `${API_URL}${editingId}/` : API_URL;
            const method = editingId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    resetForm();
                    getProducts();
                } else {
                    alert('Error en la operación. Revisa los datos.');
                }
            } catch (e) { console.error(e); }
        });

        // 5. Borrar
        async function deleteProduct(id) {
            if (confirm('¿Eliminar?')) {
                await fetch(`${API_URL}${id}/`, { method: 'DELETE' });
                getProducts();
            }
        }

        getProducts();
    </script>
</body>
</html>
